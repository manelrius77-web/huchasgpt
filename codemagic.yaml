workflows:
  expo-web-build:
    name: MisHuchas Web Check
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Check project
        script: |
          npm run lint || true
      - name: Export web build
        script: |
          npx expo export --platform web
    artifacts:
      - dist/**

  expo-ios-build:
    name: MisHuchas iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - huchas_distribucion

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Prebuild iOS
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Create export options
        script: |
          cat > /Users/builder/export_options.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.manelrius.mishuchas</key>
              <string>[expo] com.manelrius.mishuchas AppStore 2026-04-23T22:47:42.109Z</string>
            </dict>
            <key>teamID</key>
            <string>W27J7P3Z8R</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Set up code signing
        script: |
          xcode-project use-profiles --project ios/MisHuchas.xcodeproj
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/MisHuchas.xcworkspace \
            --scheme MisHuchas \
            --export-options-plist /Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa